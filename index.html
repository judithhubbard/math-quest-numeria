<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathMaker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👑</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>⚔️ MathMaker 👑</h1>
    <div class="subtitle">Ten tasks. Ten treasures. One hero who knows their numbers.</div>
  </header>

  <div id="game">
    <canvas id="canvas" width="600" height="440"></canvas>
    <aside id="sidebar">
      <div class="stat" id="statHp"></div>
      <div class="stat" id="statGold"></div>
      <div class="stat" id="statLevel"></div>
      <div class="stat" id="statGear"></div>
      <div class="stat" id="statPotions"></div>
      <div class="stat" id="statStreak"></div>
      <div id="taskBox"></div>
      <div class="buttons">
        <button id="btnPotion">🧪 Potion (P)</button>
        <button id="btnReport">📊 Report (R)</button>
        <button id="btnSwitch" class="secondary">👤 Switch</button>
      </div>
      <div id="log"></div>
      <div class="keys-hint">Move: arrow keys or WASD · Bump into things to interact</div>
    </aside>
  </div>

  <div id="overlay" class="hidden">
    <div id="modalBox"></div>
  </div>

  <div id="profileScreen" class="hidden">
    <div class="profile-card">
      <h1>⚔️ MathMaker 👑</h1>
      <div class="tag">A math adventure in the kingdom of Numeria</div>
      <div id="profileList"></div>
      <div class="new-row">
        <input id="newName" type="text" maxlength="20" placeholder="New adventurer's name" autocomplete="off">
        <button id="btnNew" class="primary">Start ▶</button>
      </div>
    </div>
  </div>

  <script src="js/problems.js"></script>
  <script src="js/mastery.js"></script>
  <script src="js/data.js"></script>
  <script src="js/maps.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
